paths:
  input_root: "input_cards"
  raw_root: "raw_outputs"
  processed_root: "processed"
  plots_root: "analysis/plots"

serpent:
  command: "sss2"
  detectors:
    - "flux_2g"
    - "flux_7g"
    - "u235_fiss_2g"
    - "u235_fiss_7g"
    - "u233_fiss_2g"
    - "u233_fiss_7g"
    - "pu239_fiss_2g"
    - "pu239_fiss_7g"
    - "th232_cap_2g"
    - "th232_cap_7g"
    - "u238_cap_2g"
    - "u238_cap_7g"
    - "pa233_cap_2g"
    - "pa233_cap_7g"

burnup:
  units: "GWd_per_tHM"
  target_steps: [0.1, 0.4, 0.7, 1.0, 1.3, 1.6, 2.0, 2.5, 3.0, 4.0, 5.0, 6.0, 7.0, 8.0, 10.0, 12.0, 14.0, 16.0, 18.0, 20.0, 24.0, 28.0, 34.0, 42.0, 50.0]

conversion_ratio:
  source: "CONVERSION_RATIO"
  target: 1.0

group_constants:
  available:
    - "INF_FLX"
    - "INF_DIFFCOE"
    - "INF_ABS"
    - "INF_FISS"
    - "INF_NSF"
    - "INF_S0"
    - "INF_S1"

nuclides:
  critical: ["U233", "Pa233", "Th232", "Pu239", "U238", "U235"]
  poisons: ["Sm149", "Xe135", "Gd155", "Gd157"]
  fission_products: ["Cs137", "Sr90", "I129", "Nd143", "Nd145"]

analysis:
  cr_target: 1.0
  figure_format: "png"
  dpi: 150

cache:
  enabled: true
  directory: ".cache"
  ttl_hours: 24
